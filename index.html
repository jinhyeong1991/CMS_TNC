/* ════════════════════════════════════════════════════════
   LG전자 에어컨 파싱
════════════════════════════════════════════════════════ */
// col[0]=비고(무시), col[1]=전월대비(무시), col[2]=채널(무시)
// col[3]=제품군(에어컨), col[4]=구분1, col[5]=구분2/설치타입
// col[6]=제품모델명(CSMS등록)=모델명, col[7]=방문주기, col[8]=서비스타입
// col[9]=멤버십(무시), col[10]=케어요금(무시), col[11~18]=원가(무시)
// col[19]=6년총구독료(무시), col[20]=① 추가할인(무시)
// col[21]=36구독(001), col[22]=48구독(001), col[23]=48신규결합(027)
// col[24]=60구독(001), col[25]=60신규결합(027)
// col[26]=72구독(001), col[27]=72신규결합(027), col[28]=72기존결합(028)
// col[29~36]=정산수수료(무시)
// col[37]=30%선납금액, col[38]=30%구독료, col[39]=50%선납금액, col[40]=50%구독료
const LG_AIRCON_FEES = [
  {months:36, year:3, col:21, sub:'001'},
  {months:48, year:4, col:22, sub:'001'},
  {months:48, year:4, col:23, sub:'027'},
  {months:60, year:5, col:24, sub:'001'},
  {months:60, year:5, col:25, sub:'027'},
  {months:72, year:6, col:26, sub:'001'},
  {months:72, year:6, col:27, sub:'027'},
  {months:72, year:6, col:28, sub:'028'},
];
const LG_AIRCON_SEONAPGUM = [
  {feeCol:38, amtCol:37, label:'30'},
  {feeCol:40, amtCol:39, label:'50'},
];

function transformLgAircon(rawRows, prefix, dateStr) {
  // 파일 버전 자동 감지: "프로모션 적용 최종 월요금" 헤더 위치로 컬럼 오프셋 결정
  // 5월 포맷: feeStart=21, seonapStart=37
  // 6월 포맷: 선납금이 col[20-23]으로 이동 → feeStart=25, seonapStart=20
  let feeStart    = 21;
  let seonapStart = 37;

  outer1: for (let ri = 0; ri < Math.min(4, rawRows.length); ri++) {
    const row = rawRows[ri];
    for (let ci = 10; ci < row.length; ci++) {
      if (String(row[ci] || '').includes('프로모션 적용 최종 월요금')) {
        feeStart = ci;
        break outer1;
      }
    }
  }
  outer2: for (let ri = 0; ri < Math.min(4, rawRows.length); ri++) {
    const row = rawRows[ri];
    for (let ci = 10; ci < row.length; ci++) {
      const v = String(row[ci] || '');
      if (v.includes('30%') && v.includes('선납')) {
        seonapStart = ci;
        break outer2;
      }
    }
  }

  const FEES = [
    {months:36, year:3, col:feeStart,   sub:'001'},
    {months:48, year:4, col:feeStart+1, sub:'001'},
    {months:48, year:4, col:feeStart+2, sub:'027'},
    {months:60, year:5, col:feeStart+3, sub:'001'},
    {months:60, year:5, col:feeStart+4, sub:'027'},
    {months:72, year:6, col:feeStart+5, sub:'001'},
    {months:72, year:6, col:feeStart+6, sub:'027'},
    {months:72, year:6, col:feeStart+7, sub:'028'},
  ];
  const SEONAPGUM = [
    {feeCol:seonapStart+1, amtCol:seonapStart,   label:'30'},
    {feeCol:seonapStart+3, amtCol:seonapStart+2, label:'50'},
  ];

  const items = [];

  for (const row of rawRows) {
    const 제품군   = String(row[3] || '').trim();
    const 구분1   = String(row[4] || '').trim();
    const 구분2   = String(row[5] || '').trim();
    const 모델명   = String(row[6] || '').trim();
    const 방문raw  = String(row[7] || '').trim();
    const svcType  = String(row[8] || '').trim();

    if (!모델명 || !제품군) continue;
    // 프로모션 최종 36개월 구독료(feeStart 컬럼)가 유효한 행만 처리
    const firstFee = row[feeStart];
    if (firstFee === '' || firstFee === null || firstFee === undefined || isNaN(Number(firstFee)) || Number(firstFee) <= 0) continue;

    // 방문주기
    const 방문Num = parseInt(String(방문raw).replace('개월','').trim(), 10);
    const isJaga  = isNaN(방문Num) || 방문Num <= 0;
    const visitVal = isJaga ? '관리없음' : `${방문Num}개월`;
    const mgmtCode = isJaga ? '002' : '001';

    // 품목명
    const midParts = [];
    if (구분1 && 구분1 !== '-') midParts.push(구분1);
    if (구분2 && 구분2 !== '-' && 구분2 !== 구분1) midParts.push(구분2);
    if (제품군 && !midParts.includes(제품군)) midParts.push(제품군);
    const svcPart  = (svcType && svcType !== '-') ? ` (${svcType})` : '';
    const itemName = `${모델명} ${midParts.join(' ')}${svcPart}`;

    // 렌탈료 (프로모션 적용 최종 월요금, 자동 감지된 feeStart 기준)
    for (const f of FEES) {
      const fee = row[f.col];
      if (fee === '' || fee === null || fee === undefined) continue;
      const feeNum = Number(fee);
      if (isNaN(feeNum) || feeNum <= 0) continue;
      items.push({ model:모델명, itemName, months:f.months, year:f.year,
                   sub:f.sub, mgmtCode, visitVal, fee:feeNum, bigo1:'' });
    }

    // 선납금 30%/50% (자동 감지된 seonapStart 기준)
    for (const s of SEONAPGUM) {
      const fee = row[s.feeCol];
      const amt = row[s.amtCol];
      if (fee === '' || fee === null || fee === undefined) continue;
      const feeNum = Number(fee);
      if (isNaN(feeNum) || feeNum <= 0) continue;
      const amtNum = Number(amt);
      const bigo1 = (amtNum > 0)
        ? `${s.label}% 선납금 : ${amtNum.toLocaleString('ko-KR')}원`
        : '';
      items.push({ model:모델명, itemName, months:72, year:6, sub:'029',
                   mgmtCode, visitVal, fee:feeNum, bigo1 });
    }
  }

  const modelSeq = new Map();
  let seq = 0;
  items.forEach(r => { if (!modelSeq.has(r.model)) { seq++; modelSeq.set(r.model, seq); } });

  const result = items.map(r => ({
    '제품코드': `${prefix}${dateStr}${String(modelSeq.get(r.model)||1).padStart(4,'0')}`,
    '품목':     buildLgItemName(r.itemName, r.color || '', r.year, r.visitVal, r.sub),
    '_baseItemName': r.itemName,
    '모델명':   r.model,
    '색상':     '',
    '제품구분': '034',
    '관리방법': r.mgmtCode,
    '세부구분': r.sub,
    '약정방법': `${r.year}년의무`,
    '의무':     r.months,
    '렌탈료':   r.fee,
    '방문주기': r.visitVal,
    '프로모션': '',
    '비고1':    r.bigo1,
    '비고2':    '',
    _hasError: false,
  }));

  const seen = new Set();
  return result.filter(row => {
    const key = OUTPUT_COLS.map(c => (row[c] ?? '')).join('|');
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function LgAirconConverter() {
  const [phase,    setPhase]    = useState('upload');
  const [prefix,   setPrefix]   = useState('LG');
  const [dateStr,  setDateStr]  = useState(getTodayDateStr());
  const [fileName, setFileName] = useState('');
  const [rawRows,  setRawRows]  = useState([]);
  const [result,   setResult]   = useState([]);
  const [over,     setOver]     = useState(false);
  const inputRef = useRef();

  const doTransform = (rows, p, d) => { const res = transformLgAircon(rows, p, d); setResult(res); return res; };
  const handlePrefix = (p) => { setPrefix(p); if (rawRows.length) doTransform(rawRows, p, dateStr); };
  const handleDate   = (d) => { setDateStr(d); if (rawRows.length) doTransform(rawRows, prefix, d); };

  const readFile = (file) => {
    if (!file) return;
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['xlsx','xls','csv'].includes(ext)) { alert('xlsx, xls, csv 파일만 가능합니다.'); return; }
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb   = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
        const ws   = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
        setFileName(file.name);
        setRawRows(rows);
        const res = doTransform(rows, prefix, dateStr);
        if (res.length > 0) setPhase('preview');
        else alert('변환된 데이터가 없습니다. 파일 형식을 확인해주세요.');
      } catch(err) { alert('파일 읽기 오류: '+err.message); }
    };
    reader.readAsArrayBuffer(file);
  };

  const loaded = rawRows.length > 0;

  return (
    <>
      <div className="card fi" style={{marginBottom:20}}>
        <div className="card-head"><div className="card-icon">🏷️</div><span className="card-title">제품코드 설정</span></div>
        <LgCodeConfig prefix={prefix} onPrefixChange={handlePrefix} dateStr={dateStr} onDateChange={handleDate} />
      </div>

      <div className="grid-2 fi">
        <div className="card">
          <div className="card-head"><div className="card-icon">📁</div><span className="card-title">LG 에어컨 수수료표 업로드</span></div>
          <div
            className={`drop-zone${over?' over':''}${loaded?' loaded':''}`}
            onDragOver={e=>{e.preventDefault();setOver(true);}}
            onDragLeave={()=>setOver(false)}
            onDrop={e=>{e.preventDefault();setOver(false);readFile(e.dataTransfer.files[0]);}}
            onClick={()=>inputRef.current?.click()}
          >
            <input ref={inputRef} type="file" accept=".xlsx,.xls,.csv" onChange={e=>readFile(e.target.files[0])} />
            {loaded ? (
              <><div className="drop-icon">✅</div>
                <div className="drop-title" style={{color:'var(--green)'}}>{fileName}</div>
                <div className="drop-sub">{result.length.toLocaleString()}행 변환됨 · 클릭하여 재업로드</div></>
            ) : (
              <><div className="drop-icon">❄️</div>
                <div className="drop-title">LG 에어컨 수수료표를 이곳에 끌어다 놓으세요</div>
                <div className="drop-sub">벽걸이 · 스탠드 · 시스템 · 2in1 등</div>
                <div className="drop-formats"><span className="fmt-tag">.xlsx</span><span className="fmt-tag">.xls</span></div></>
            )}
          </div>
          <div className="info-box">
            <strong>자동 처리 항목</strong>
            · <b>모델명</b> 제품모델명(CSMS등록) 컬럼<br/>
            · <b>품목명</b> 모델명 + [구분1+구분2+제품군(중복제거)] + (서비스타입)<br/>
            · <b>예시</b> SQ06GJ1WES.AKOR 벽걸이 에어컨 (프리미엄)<br/>
            · <b>중복제거</b> 벽걸이+벽걸이 → 벽걸이 (자동)<br/>
            · <b>렌탈료</b> 프로모션 적용 최종 월요금 컬럼(col 21~28) 사용<br/>
            · <b>무시</b> 원가·① 추가할인·6년총구독료·정산수수료·멤버십·케어금액·비고·채널
          </div>
        </div>

        <div className="card fi fi-1">
          <div className="card-head"><div className="card-icon">📖</div><span className="card-title">변환 규칙 참고</span></div>
          <div>
            <div className="ref-block">
              <div className="sec-label">품목명 구성 (중복 자동 제거)</div>
              <div className="ref-rule-row"><span className="ref-rule-kw">벽걸이 + 벽걸이 + 에어컨</span><span className="ref-rule-arr">→</span><span className="ref-rule-out">벽걸이 에어컨</span></div>
              <div className="ref-rule-row"><span className="ref-rule-kw">쿨2시리즈 + 2in1 + 에어컨</span><span className="ref-rule-arr">→</span><span className="ref-rule-out">쿨2시리즈 2in1 에어컨</span></div>
            </div>
            <div className="divider" />
            <div className="ref-block">
              <div className="sec-label">세부구분 코드</div>
              {[{kw:'구독료(단품)',arr:'→',out:'001 일반'},{kw:'신규결합(3%)',arr:'→',out:'027'},{kw:'기존결합(3%)',arr:'→',out:'028'},{kw:'30%/50% 선납',arr:'→',out:'029 (비고1 기재)'}]
                .map((r,i)=>(<div className="ref-rule-row" key={i}><span className="ref-rule-kw">{r.kw}</span><span className="ref-rule-arr">{r.arr}</span><span className="ref-rule-out">{r.out}</span></div>))}
            </div>
            <div className="divider" />
            <div className="ref-block">
              <div className="sec-label">약정방법 / 의무</div>
              {[{kw:'36개월',arr:'→',out:'3년의무'},{kw:'48개월',arr:'→',out:'4년의무'},{kw:'60개월',arr:'→',out:'5년의무'},{kw:'72개월',arr:'→',out:'6년의무'}]
                .map((r,i)=>(<div className="ref-rule-row" key={i}><span className="ref-rule-kw">{r.kw}</span><span className="ref-rule-arr">{r.arr}</span><span className="ref-rule-out">{r.out}</span></div>))}
            </div>
          </div>
        </div>
      </div>

      {phase === 'preview' && result.length > 0 && (
        <>
          <PreviewTable result={result} />
          <div className="act-bar fi fi-2">
            <div className="act-info">
              <strong>{result.length.toLocaleString()}행</strong> 변환 완료 · ✅ LG 에어컨<br/>
              <span style={{fontSize:12}}>출력 파일명: {fileName.replace(/\.(xlsx|xls|csv)$/i,'_LG신전산.xlsx')}</span>
            </div>
            <div className="act-btns">
              <button className="btn-ghost" onClick={()=>{setPhase('upload');setRawRows([]);setResult([]);setFileName('');}}>← 초기화</button>
              <button className="btn-dl" onClick={()=>exportLgXlsx(result, fileName, 'LG에어컨')}>📥 신전산 엑셀 다운로드</button>
              <button className="btn-dl" style={{background:'#1565c0',marginLeft:8}} onClick={()=>exportLgXlsxShort(result, fileName, 'LG에어컨')}>📥 신전산 엑셀 다운로드 2</button>
              <button className="btn-ghost" style={{border:'1.5px solid var(--blue)',color:'var(--blue)'}} onClick={()=>exportGujeonXlsx(transformLgToGujeon(result, getFullDateStr(), 1), fileName)}>📥 구전산 변환 다운로드</button>
            </div>
          </div>
        </>
      )}
    </>
  );
}

/* ════════════════════════════════════════════════════════
   LG전자 리빙(세탁기·스타일러·안마의자·청소기·슈케어) 파싱
════════════════════════════════════════════════════════ */
// 리빙 컬럼 구조 (파일 버전별 자동 감지)
// 공통: col[3]=제품군, col[4]=구분1, col[5]=구분2, col[6]=모델명
//       col[8]=케어십형태, col[9]=방문주기
//       col[11~18]=L~S 원요금(oCol, 폴백용)
// 5월: feeStart=22(W~AD), seonapStart=38(AM~AP)
// 6월: feeStart=26(AA~AH), seonapStart=19(T~W)
// 미운영 값은 pCol에서 감지 시 해당 구간 완전 제외

function getLgLivingProdCat(제품군) {
  const g = 제품군;
  if (g.includes('건조기'))  return '009';
  if (g.includes('스타일러')) return '012';
  if (g.includes('안마의자')) return '004';
  if (g.includes('슈케어'))  return '047'; // 생활가전
  if (g.includes('청소기') || g.includes('로봇')) return '035';
  return '033'; // 워시콤보·워시타워·드럼·통돌이·미니워시 → 세탁기/워시타워
}

function transformLgLiving(rawRows, prefix, dateStr) {
  // 파일 버전 자동 감지
  // feeStart: "프로모션 적용 최종 월요금" 헤더 컬럼
  // seonapStart: "30% 선납" 텍스트 컬럼
  let feeStart    = 22;  // 5월 기본값
  let seonapStart = 38;  // 5월 기본값

  outer1: for (let ri = 0; ri < Math.min(5, rawRows.length); ri++) {
    const row = rawRows[ri];
    for (let ci = 11; ci < row.length; ci++) {
      if (String(row[ci] || '').includes('프로모션 적용 최종 월요금')) {
        feeStart = ci;
        break outer1;
      }
    }
  }
  outer2: for (let ri = 0; ri < Math.min(5, rawRows.length); ri++) {
    const row = rawRows[ri];
    for (let ci = 11; ci < row.length; ci++) {
      const v = String(row[ci] || '');
      if (v.includes('30%') && v.includes('선납')) {
        seonapStart = ci;
        break outer2;
      }
    }
  }

  const FEES = [
    {months:36, year:3, pCol:feeStart,   oCol:11, sub:'001'},
    {months:48, year:4, pCol:feeStart+1, oCol:12, sub:'001'},
    {months:48, year:4, pCol:feeStart+2, oCol:13, sub:'027'},
    {months:60, year:5, pCol:feeStart+3, oCol:14, sub:'001'},
    {months:60, year:5, pCol:feeStart+4, oCol:15, sub:'027'},
    {months:72, year:6, pCol:feeStart+5, oCol:16, sub:'001'},
    {months:72, year:6, pCol:feeStart+6, oCol:17, sub:'027'},
    {months:72, year:6, pCol:feeStart+7, oCol:18, sub:'028'},
  ];
  const SNP = [
    {feeCol:seonapStart+1, amtCol:seonapStart,   label:'30'},
    {feeCol:seonapStart+3, amtCol:seonapStart+2, label:'50'},
  ];

  const items = [];

  for (const row of rawRows) {
    const 제품군  = String(row[3] || '').trim();
    const 구분1  = String(row[4] || '').trim();
    const 구분2  = String(row[5] || '').trim();
    const 모델명  = String(row[6] || '').trim();
    const 케어타입 = String(row[8] || '').trim();
    const 방문raw = String(row[9] || '').trim();

    if (!모델명 || !제품군) continue;
    if (제품군 === '제품군' || 모델명 === '모델명') continue;

    const isJaga  = 케어타입.includes('자가');
    const 방문Num = parseInt(방문raw.replace('개월','').trim(), 10);
    const visitVal = isJaga ? '관리없음' : (!isNaN(방문Num) && 방문Num > 0 ? `${방문Num}개월` : '관리없음');
    const mgmtCode = (isJaga || 방문Num <= 0) ? '002' : '001';

    const isValid = v => v && v.trim() && v.trim() !== '없음' && v.trim() !== '-';
    const midParts = [];
    if (isValid(구분2)) midParts.push(구분2.trim());
    if (isValid(구분1)) midParts.push(구분1.trim());
    midParts.push(제품군);
    const svcPart  = (케어타입 && 케어타입 !== '-') ? ` (${케어타입})` : '';
    const itemName = `${모델명} ${midParts.join(' ')}${svcPart}`;
    const prodCat  = getLgLivingProdCat(제품군);

    // 렌탈료: 프로모션(pCol) 우선, 미운영이면 전체 제외, 0이면 원요금(oCol) 폴백
    for (const f of FEES) {
      const pVal = row[f.pCol];
      if (String(pVal || '').includes('미운영')) continue;
      const pFee = Number(pVal);
      const oFee = Number(row[f.oCol]);
      const feeNum = (pFee > 0) ? pFee : (oFee > 0 ? oFee : 0);
      if (feeNum <= 0) continue;
      items.push({ model:모델명, itemName, months:f.months, year:f.year,
                   sub:f.sub, mgmtCode, visitVal, fee:feeNum, prodCat, bigo1:'' });
    }

    // 선납금 30%/50% (자동 감지 seonapStart, sub='029', 72개월 고정)
    for (const s of SNP) {
      const fee = row[s.feeCol];
      const amt = row[s.amtCol];
      if (fee === '' || fee === null || fee === undefined) continue;
      const feeNum = Number(fee);
      if (isNaN(feeNum) || feeNum <= 0) continue;
      const amtNum = Number(amt);
      const bigo1 = (amtNum > 0)
        ? `${s.label}% 선납금 : ${amtNum.toLocaleString('ko-KR')}원`
        : '';
      items.push({ model:모델명, itemName, months:72, year:6, sub:'029',
                   mgmtCode, visitVal, fee:feeNum, prodCat, bigo1 });
    }
  }

  const modelSeq = new Map();
  let seq = 0;
  items.forEach(r => { if (!modelSeq.has(r.model)) { seq++; modelSeq.set(r.model, seq); } });

  const result = items.map(r => ({
    '제품코드': `${prefix}${dateStr}${String(modelSeq.get(r.model)||1).padStart(4,'0')}`,
    '품목':     buildLgItemName(r.itemName, r.color || '', r.year, r.visitVal, r.sub),
    '_baseItemName': r.itemName,
    '모델명':   r.model,
    '색상':     '',
    '제품구분': r.prodCat,
    '관리방법': r.mgmtCode,
    '세부구분': r.sub,
    '약정방법': `${r.year}년의무`,
    '의무':     r.months,
    '렌탈료':   r.fee,
    '방문주기': r.visitVal,
    '프로모션': '',
    '비고1':    r.bigo1,
    '비고2':    '',
    _hasError: false,
  }));

  const seen = new Set();
  return result.filter(row => {
    const key = OUTPUT_COLS.map(c => (row[c] ?? '')).join('|');
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

const FINAL_CATS = [
  {id:'jeongsugi',   label:'정수기',          icon:'💧', fn: transformLgJeongsugi},
  {id:'naengjanggo', label:'냉장고(김냉포함)', icon:'🧊', fn: transformLgNaengjanggo},
  {id:'cooking',     label:'쿠킹',            icon:'🍳', fn: transformLgCooking},
  {id:'tv',          label:'TV',             icon:'📺', fn: transformLgTV},
  {id:'air',         label:'공기청정기',       icon:'💨', fn: transformLgAir},
  {id:'aircon',      label:'에어컨',          icon:'❄️', fn: transformLgAircon},
  {id:'living',      label:'리빙',            icon:'🏠', fn: transformLgLiving},
];

function combineLgAll(catData, prefix, dateStr) {
  // 각 카테고리별 파싱 → 임시 코드로 결과 생성 → 전체 모델 재번호 부여
  const DUMMY = ['XX','000000'];
  const allRows = [];
  for (const cat of FINAL_CATS) {
    if (!catData[cat.id]) continue;
    const rows = cat.fn(catData[cat.id], ...DUMMY);
    allRows.push(...rows);
  }
  // 전체 모델 순서대로 전역 시퀀스 부여
  const globalSeq = new Map();
  let seq = 0;
  allRows.forEach(r => {
    const m = r['모델명'];
    if (m && !globalSeq.has(m)) { seq++; globalSeq.set(m, seq); }
  });
  // 제품코드 교체 (4자리)
  const finalRows = allRows.map(r => ({
    ...r,
    '제품코드': `${prefix}${dateStr}${String(globalSeq.get(r['모델명'])||1).padStart(4,'0')}`,
  }));
  // 최종 중복 제거
  const seen = new Set();
  return finalRows.filter(row => {
    const key = OUTPUT_COLS.map(c => (row[c] ?? '')).join('|');
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function MiniSlot({ cat, fileData, onFile }) {
  const inputRef = useRef();
  const [over, setOver] = useState(false);

  const readFile = (file) => {
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['xlsx','xls','csv'].includes(ext)) { alert('xlsx, xls, csv 파일만'); return; }
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb   = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
        const ws   = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
        onFile(cat.id, file.name, rows);
      } catch(err) { alert('파일 읽기 오류: '+err.message); }
    };
    reader.readAsArrayBuffer(file);
  };

  const loaded = !!fileData;
  return (
    <div
      className={`mini-slot${over?' mover':''}${loaded?' mloaded':''}`}
      onDragOver={e=>{e.preventDefault();setOver(true);}}
      onDragLeave={()=>setOver(false)}
      onDrop={e=>{e.preventDefault();setOver(false);readFile(e.dataTransfer.files[0]);}}
      onClick={()=>inputRef.current?.click()}
    >
      <input ref={inputRef} type="file" accept=".xlsx,.xls,.csv"
             onChange={e=>readFile(e.target.files[0])} style={{display:'none'}} />
      <div className="mini-slot-icon">{loaded ? '✅' : cat.icon}</div>
      <div className="mini-slot-label">{cat.label}</div>
      <div className="mini-slot-status">
        {loaded
          ? fileData.name.replace(/\.(xlsx|xls|csv)$/i,'')
          : '클릭 또는 드래그'}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   LG전자 신전산 → 구전산 변환
════════════════════════════════════════════════════════ */
const GUJEON_OUTPUT_COLS = [
  '제품코드','제품명','모델명','제품그룹','브랜드',
  '일반판매가','렌탈기간','렌탈가','접수여부','조리수체크',
  '제품설명','세부구분','입력자','입력일시','수정자','수정일시',
];

function getFullDateStr() {
  const d = new Date();
  const yyyy = String(d.getFullYear());
  const mm   = String(d.getMonth()+1).padStart(2,'0');
  const dd   = String(d.getDate()).padStart(2,'0');
  return yyyy + mm + dd;
}

function buildGujeonProductName(row) {
  const 품목     = String(row['품목']     || '').trim();
  const 약정     = String(row['약정방법'] || '').trim();
  const 방문     = String(row['방문주기'] || '').trim();
  const 색상     = String(row['색상']     || '').trim();
  const 세부구분 = String(row['세부구분'] || '').trim();
  const 비고1   = String(row['비고1']    || '').trim();

  let name = 품목;
  if (약정) name += ` (${약정})`;
  if (방문 === '관리없음') {
    name += ' [자가관리]';
  } else if (방문) {
    name += ` ${방문}방문`;
  }

  if (세부구분 === '029' && 비고1) {
    // "30% 선납금 : 1,652,400원" → "[선납금 30% 1,652,400원]"
    const m = 비고1.match(/(\d+)%\s*선납금\s*:\s*([\d,]+원)/);
    name += m ? ` [선납금 ${m[1]}% ${m[2]}]` : ` [${비고1}]`;
  } else if (색상) {
    const colorName = 색상.split(',')
      .map(c => c.replace(/\s*\([A-Za-z0-9]+\)$/, '').trim())
      .filter(Boolean).join('/') || 색상;
    name += ` [${colorName}]`;
  }
  return name;
}

function transformLgToGujeon(rows, dateStr, startSeq) {
  const result = [];
  let seq = startSeq || 1;
  for (const row of rows) {
    const model = String(row['모델명'] || '').trim();
    if (!model) continue;
    result.push({
      '제품코드':   `LG${dateStr}${String(seq++).padStart(4,'0')}`,
      '제품명':     buildGujeonProductName(row),
      '모델명':     model,
      '제품그룹':   String(row['제품구분'] || '').trim(),
      '브랜드':     '□LG퓨리케어',
      '일반판매가': 0,
      '렌탈기간':   row['의무']   !== undefined ? row['의무']   : '',
      '렌탈가':     row['렌탈료'] !== undefined ? row['렌탈료'] : '',
      '접수여부':   '',
      '조리수체크': '',
      '제품설명':   '',
      '세부구분':   String(row['세부구분'] || '').trim(),
      '입력자':     'TNC임진형',
      '입력일시':   '',
      '수정자':     '',
      '수정일시':   '',
    });
  }
  return result;
}

function exportGujeonXlsx(result, fileName) {
  const data = result.map(row => {
    const out = {};
    GUJEON_OUTPUT_COLS.forEach(c => { out[c] = row[c] !== undefined ? row[c] : ''; });
    return out;
  });
  const ws = XLSX.utils.json_to_sheet(data, { header: GUJEON_OUTPUT_COLS });
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '구전산');
  XLSX.writeFile(wb, fileName.replace(/\.(xlsx|xls|csv)$/i, '_LG구전산.xlsx'));
}

function exportGujeonXlsxSplit(result, fileName, chunkSize) {
  const size = chunkSize || 5000;
  const total = Math.ceil(result.length / size);
  const base = fileName.replace(/\.(xlsx|xls|csv)$/i, '');
  for (let i = 0; i < total; i++) {
    (function(idx) {
      setTimeout(function() {
        const chunk = result.slice(idx * size, (idx + 1) * size);
        const data = chunk.map(row => {
          const out = {};
          GUJEON_OUTPUT_COLS.forEach(c => { out[c] = row[c] !== undefined ? row[c] : ''; });
          return out;
        });
        const ws = XLSX.utils.json_to_sheet(data, { header: GUJEON_OUTPUT_COLS });
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, '구전산');
        XLSX.writeFile(wb, `${base}_구전산_${String(idx+1).padStart(3,'0')}of${String(total).padStart(3,'0')}.xlsx`);
      }, idx * 700);
    })(i);
  }
}

function LgToGujeonConverter() {
  const [phase,    setPhase]    = useState('upload');
  const [dateStr,  setDateStr]  = useState(getFullDateStr());
  const [startSeq, setStartSeq] = useState('1');
  const [fileName, setFileName] = useState('');
  const [rawData,  setRawData]  = useState([]);
  const [result,   setResult]   = useState([]);
  const [over,     setOver]     = useState(false);
  const inputRef = useRef();

  const doTransform = (rows, date, seq) => {
    const res = transformLgToGujeon(rows, date, parseInt(seq)||1);
    setResult(res);
    return res;
  };
  const handleDate = d => { setDateStr(d); if (rawData.length) doTransform(rawData, d, startSeq); };
  const handleSeq  = s => { setStartSeq(s); if (rawData.length) doTransform(rawData, dateStr, s); };

  const readFile = file => {
    if (!file) return;
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['xlsx','xls','csv'].includes(ext)) { alert('xlsx, xls, csv 파일만 가능합니다.'); return; }
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb   = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
        const ws   = wb.Sheets[wb.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(ws, {defval:''});
        if (!json.length) { alert('데이터가 없습니다.'); return; }
        setFileName(file.name);
        setRawData(json);
        const res = doTransform(json, dateStr, startSeq);
        if (res.length > 0) setPhase('preview');
        else alert('변환된 데이터가 없습니다.\n신전산 CMS 파일(품목·모델명 컬럼 포함)을 확인해주세요.');
      } catch(err) { alert('파일 읽기 오류: '+err.message); }
    };
    reader.readAsArrayBuffer(file);
  };

  const loaded  = rawData.length > 0;
  const seqNum  = parseInt(startSeq) || 1;
  const endSeq  = seqNum + result.length - 1;

  return (
    <>
      <div className="card fi" style={{marginBottom:20}}>
        <div className="card-head">
          <div className="card-icon">🏷️</div>
          <span className="card-title">제품코드 설정 (LG + 날짜 8자리 + 순번 4자리)</span>
        </div>
        <div style={{display:'flex', alignItems:'center', gap:18, flexWrap:'wrap'}}>
          <div style={{display:'flex', alignItems:'center', gap:8}}>
            <span style={{fontSize:13, fontWeight:600, color:'var(--text-sub)'}}>날짜(YYYYMMDD)</span>
            <input
              style={{height:36, width:120, padding:'0 10px', border:'1.5px solid var(--gray-2)', borderRadius:8, fontSize:13, fontFamily:'var(--mono)', background:'var(--white)', color:'var(--text)', outline:'none'}}
              type="text" maxLength={8} placeholder="20260601" value={dateStr}
              onChange={e => handleDate(e.target.value.replace(/\D/g,'').slice(0,8))}
            />
          </div>
          <div style={{display:'flex', alignItems:'center', gap:8}}>
            <span style={{fontSize:13, fontWeight:600, color:'var(--text-sub)'}}>시작 번호</span>
            <input
              style={{height:36, width:80, padding:'0 10px', border:'1.5px solid var(--gray-2)', borderRadius:8, fontSize:13, fontFamily:'var(--mono)', background:'var(--white)', color:'var(--text)', outline:'none'}}
              type="number" min={1} value={startSeq}
              onChange={e => handleSeq(e.target.value)}
            />
          </div>
          <div className="code-preview-box">
            <div className="code-preview">LG{dateStr||'YYYYMMDD'}{String(seqNum).padStart(4,'0')}</div>
            <div className="code-preview-note">각 행마다 순차 증가 · 모든 행 고유번호</div>
          </div>
        </div>
      </div>

      <div className="grid-2 fi">
        <div className="card">
          <div className="card-head">
            <div className="card-icon">📁</div>
            <span className="card-title">LG전자 신전산 CMS 파일 업로드</span>
          </div>
          <div
            className={`drop-zone${over?' over':''}${loaded?' loaded':''}`}
            onDragOver={e=>{e.preventDefault();setOver(true);}}
            onDragLeave={()=>setOver(false)}
            onDrop={e=>{e.preventDefault();setOver(false);readFile(e.dataTransfer.files[0]);}}
            onClick={()=>inputRef.current?.click()}
          >
            <input ref={inputRef} type="file" accept=".xlsx,.xls,.csv" onChange={e=>readFile(e.target.files[0])} />
            {loaded ? (
              <>
                <div className="drop-icon">✅</div>
                <div className="drop-title" style={{color:'var(--green)'}}>{fileName}</div>
                <div className="drop-sub">{result.length.toLocaleString()}행 변환됨 · 클릭하여 재업로드</div>
              </>
            ) : (
              <>
                <div className="drop-icon">📊</div>
                <div className="drop-title">LG전자 신전산 CMS 파일을 이곳에 끌어다 놓으세요</div>
                <div className="drop-sub">신전산 변환기 출력 파일 (_LG신전산.xlsx)</div>
                <div className="drop-formats">
                  <span className="fmt-tag">.xlsx</span>
                  <span className="fmt-tag">.xls</span>
                </div>
              </>
            )}
          </div>
          <div className="info-box">
            <strong>자동 처리 항목</strong>
            · <b>제품코드</b> LG + 날짜(8자리) + 순번 — 모든 행 고유번호<br/>
            · <b>제품명</b> 품목 (약정방법) 방문주기방문 [색상] 조합<br/>
            · <b>브랜드</b> □LG퓨리케어 (고정값)<br/>
            · <b>일반판매가</b> 0 (고정값)<br/>
            · <b>입력자</b> TNC임진형 (고정값)<br/>
            · <b>빈 값</b> 접수여부 · 조리수체크 · 제품설명 · 입력일시 · 수정자 · 수정일시
          </div>
        </div>

        <div className="card fi fi-1">
          <div className="card-head">
            <div className="card-icon">📖</div>
            <span className="card-title">변환 규칙 참고</span>
          </div>
          <div>
            <div className="ref-block">
              <div className="sec-label">신전산 → 구전산 컬럼 매핑</div>
              {[
                {kw:'제품코드',        arr:'→', out:'LG+날짜(8자리)+순번(4자리)'},
                {kw:'품목+약정+방문+색상', arr:'→', out:'제품명 (통합)'},
                {kw:'모델명',          arr:'→', out:'모델명 그대로'},
                {kw:'제품구분',        arr:'→', out:'제품그룹'},
                {kw:'브랜드 (고정)',   arr:'→', out:'□LG퓨리케어'},
                {kw:'일반판매가 (고정)',arr:'→', out:'0'},
                {kw:'의무 (개월)',     arr:'→', out:'렌탈기간'},
                {kw:'렌탈료',         arr:'→', out:'렌탈가'},
                {kw:'세부구분',        arr:'→', out:'세부구분 그대로'},
                {kw:'입력자 (고정)',   arr:'→', out:'TNC임진형'},
              ].map((r,i)=>(
                <div className="ref-rule-row" key={i}>
                  <span className="ref-rule-kw">{r.kw}</span>
                  <span className="ref-rule-arr">{r.arr}</span>
                  <span className="ref-rule-out">{r.out}</span>
                </div>
              ))}
            </div>
            <div className="divider" />
            <div className="ref-block">
              <div className="sec-label">제품명 구성 예시</div>
              <div style={{fontSize:11.5, padding:'10px 12px', background:'var(--orange-08)', border:'1px solid var(--orange-15)', borderRadius:8, fontFamily:'var(--mono)', color:'var(--text)', lineHeight:1.9}}>
                품목: 얼음(2세대) 정수기<br/>
                약정: 6년의무 · 방문: 6개월 · 색상: 블랙<br/>
                <span style={{color:'var(--orange)', fontWeight:700}}>→ 얼음(2세대) 정수기 (6년의무) 6개월방문 [블랙]</span>
              </div>
            </div>
            <div className="divider" />
            <div className="ref-block">
              <div className="sec-label">빈 값 처리 컬럼</div>
              <div className="color-chip-grid">
                {['접수여부','조리수체크','제품설명','입력일시','수정자','수정일시'].map(c=>(
                  <span className="color-chip" key={c}>{c}</span>
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>

      {phase === 'preview' && result.length > 0 && (
        <>
          <GujeonPreviewTable result={result} />
          <div className="act-bar fi fi-2">
            <div className="act-info">
              <strong>{result.length.toLocaleString()}행</strong> 구전산 변환 완료 · ✅ □LG퓨리케어<br/>
              <span style={{fontSize:12}}>
                제품코드 LG{dateStr}{String(seqNum).padStart(4,'0')} ~ LG{dateStr}{String(endSeq).padStart(4,'0')} · 출력: {fileName.replace(/\.(xlsx|xls|csv)$/i,'_LG구전산.xlsx')}
              </span>
            </div>
            <div className="act-btns">
              <button className="btn-ghost" onClick={()=>{setPhase('upload');setRawData([]);setResult([]);setFileName('');}}>← 초기화</button>
              <button className="btn-dl" onClick={()=>exportGujeonXlsx(result, fileName)}>📥 구전산 엑셀 다운로드</button>
              {result.length > 9000 && (
                <button
                  className="btn-dl"

/* ════════════════════════════════════════════════════════
   KT가전 구전산 변환
════════════════════════════════════════════════════════ */
// 입력: 브랜드(A), 제품그룹(B), 상품명(C), 모델코드(D), 계약기간(E), 렌탈료(F)
// 출력: 구전산 CMS (GUJEON_OUTPUT_COLS 동일)

function transformKT(rows, dateStr, startSeq) {
  const result = [];
  let seq = startSeq || 1;
  for (let i = 1; i < rows.length; i++) {  // row[0] = 헤더 스킵
    const row    = rows[i];
    const 상품명  = String(row[2] || '').trim();
    const 모델코드 = String(row[3] || '').trim();
    const 계약기간 = Number(row[4]);
    const 렌탈료  = Number(row[5]);
    const 제품그룹텍스트 = String(row[1] || '').trim();

    if (!상품명 || !모델코드) continue;
    if (isNaN(계약기간) || 계약기간 <= 0) continue;
    if (isNaN(렌탈료)  || 렌탈료  <= 0) continue;

    const 제품그룹코드 = detectCategory(제품그룹텍스트 + ' ' + 상품명);

    result.push({
      '제품코드':   `KT${dateStr}${String(seq++).padStart(3,'0')}`,
      '제품명':     `${상품명} (${계약기간})`,
      '모델명':     모델코드,
      '제품그룹':   제품그룹코드,
      '브랜드':     '■KT가전구독',
      '일반판매가': 0,
      '렌탈기간':   계약기간,
      '렌탈가':     렌탈료,
      '접수여부':   '',
      '조리수체크': '',
      '제품설명':   '',
      '세부구분':   '',
      '입력자':     'TNC임진형',
      '입력일시':   '',
      '수정자':     '',
      '수정일시':   '',
    });
  }
  return result;
}

function exportKTXlsx(result, fileName) {
  const data = result.map(row => {
    const out = {};
    GUJEON_OUTPUT_COLS.forEach(c => { out[c] = row[c] !== undefined ? row[c] : ''; });
    return out;
  });
  const ws = XLSX.utils.json_to_sheet(data, { header: GUJEON_OUTPUT_COLS });
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '구전산');
  XLSX.writeFile(wb, fileName.replace(/\.(xlsx|xls|csv)$/i, '_KT구전산.xlsx'));
}

function exportKTXlsxSplit(result, fileName, chunkSize) {
  const size  = chunkSize || 9000;
  const total = Math.ceil(result.length / size);
  const base  = fileName.replace(/\.(xlsx|xls|csv)$/i, '');
  for (let i = 0; i < total; i++) {
    (function(idx) {
      setTimeout(function() {
        const chunk = result.slice(idx * size, (idx + 1) * size);
        const data  = chunk.map(row => {
          const out = {};
          GUJEON_OUTPUT_COLS.forEach(c => { out[c] = row[c] !== undefined ? row[c] : ''; });
          return out;
        });
        const ws = XLSX.utils.json_to_sheet(data, { header: GUJEON_OUTPUT_COLS });
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, '구전산');
        XLSX.writeFile(wb, `${base}_KT구전산_${String(idx+1).padStart(3,'0')}of${String(total).padStart(3,'0')}.xlsx`);
      }, idx * 700);
    })(i);
  }
}

function KTPreviewTable({ result }) {
  const HIGHLIGHT = new Set(['제품코드','제품명']);
  return (
    <div className="card fi">
      <div className="card-head">
        <div className="card-icon">📋</div>
        <span className="card-title">변환 미리보기 (구전산)</span>
      </div>
      <div className="stat-row">
        <div className="stat-chip all"><span>전체</span><span className="stat-num">{result.length.toLocaleString()}</span><span>행</span></div>
        <div className="stat-chip ok"><span>✓</span><span className="stat-num">{result.length.toLocaleString()}</span><span>성공</span></div>
      </div>
      <div className="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th style={{textAlign:'center',width:36}}>#</th>
              {GUJEON_OUTPUT_COLS.map(c=>(
                <th key={c} className={HIGHLIGHT.has(c)?'new-col':''}>{c}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {result.map((row,i)=>(
              <tr key={i}>
                <td className="rnum">{i+1}</td>
                {GUJEON_OUTPUT_COLS.map(c=>{
                  const val=row[c]!==undefined?String(row[c]):'';
                  return <td key={c} className={HIGHLIGHT.has(c)?'code-cell':'mono'} title={val}>{val||'—'}</td>;
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function KTConverter() {
  const [phase,    setPhase]    = useState('upload');
  const [dateStr,  setDateStr]  = useState(getTodayDateStr());
  const [startSeq, setStartSeq] = useState('1');
  const [fileName, setFileName] = useState('');
  const [rawData,  setRawData]  = useState([]);
  const [result,   setResult]   = useState([]);
  const [over,     setOver]     = useState(false);
  const inputRef = useRef();

  const doTransform = (rows, date, seq) => {
    const res = transformKT(rows, date, parseInt(seq)||1);
    setResult(res);
    return res;
  };
  const handleDate = d => { setDateStr(d); if (rawData.length) doTransform(rawData, d, startSeq); };
  const handleSeq  = s => { setStartSeq(s); if (rawData.length) doTransform(rawData, dateStr, s); };

  const readFile = file => {
    if (!file) return;
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['xlsx','xls','csv'].includes(ext)) { alert('xlsx, xls, csv 파일만 가능합니다.'); return; }
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb   = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
        const ws   = wb.Sheets[wb.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
        if (!json.length) { alert('데이터가 없습니다.'); return; }
        setFileName(file.name);
        setRawData(json);
        const res = doTransform(json, dateStr, startSeq);
        if (res.length > 0) setPhase('preview');
        else alert('변환된 데이터가 없습니다.\n파일 형식을 확인해주세요. (헤더: 브랜드, 제품그룹, 상품명, 모델코드, 계약기간, 렌탈료)');
      } catch(err) { alert('파일 읽기 오류: '+err.message); }
    };
    reader.readAsArrayBuffer(file);
  };

  const loaded  = rawData.length > 0;
  const seqNum  = parseInt(startSeq) || 1;
  const endSeq  = seqNum + result.length - 1;

  return (
    <>
      {/* 제품코드 설정 */}
      <div className="card fi" style={{marginBottom:20}}>
        <div className="card-head">
          <div className="card-icon">🏷️</div>
          <span className="card-title">제품코드 설정 (KT + 날짜 6자리 + 순번 3자리)</span>
        </div>
        <div style={{display:'flex', alignItems:'center', gap:18, flexWrap:'wrap'}}>
          <div style={{display:'flex', alignItems:'center', gap:8}}>
            <span style={{fontSize:13, fontWeight:600, color:'var(--text-sub)'}}>날짜(YYMMDD)</span>
            <input
              style={{height:36, width:110, padding:'0 10px', border:'1.5px solid var(--gray-2)', borderRadius:8, fontSize:13, fontFamily:'var(--mono)', background:'var(--white)', color:'var(--text)', outline:'none'}}
              type="text" maxLength={6} placeholder="260601" value={dateStr}
              onChange={e => handleDate(e.target.value.replace(/\D/g,'').slice(0,6))}
            />
          </div>
          <div style={{display:'flex', alignItems:'center', gap:8}}>
            <span style={{fontSize:13, fontWeight:600, color:'var(--text-sub)'}}>시작 번호</span>
            <input
              style={{height:36, width:80, padding:'0 10px', border:'1.5px solid var(--gray-2)', borderRadius:8, fontSize:13, fontFamily:'var(--mono)', background:'var(--white)', color:'var(--text)', outline:'none'}}
              type="number" min={1} value={startSeq}
              onChange={e => handleSeq(e.target.value)}
            />
          </div>
          <div className="code-preview-box">
            <div className="code-preview">KT{dateStr||'YYMMDD'}{String(seqNum).padStart(3,'0')}</div>
            <div className="code-preview-note">각 행마다 순차 증가 · 모든 행 고유번호</div>
          </div>
        </div>
      </div>

      <div className="grid-2 fi">
        <div className="card">
          <div className="card-head">
            <div className="card-icon">📁</div>
            <span className="card-title">KT 가전제품 파일 업로드</span>
          </div>
          <div
            className={`drop-zone${over?' over':''}${loaded?' loaded':''}`}
            onDragOver={e=>{e.preventDefault();setOver(true);}}
            onDragLeave={()=>setOver(false)}
            onDrop={e=>{e.preventDefault();setOver(false);readFile(e.dataTransfer.files[0]);}}
            onClick={()=>inputRef.current?.click()}
          >
            <input ref={inputRef} type="file" accept=".xlsx,.xls,.csv" onChange={e=>readFile(e.target.files[0])} />
            {loaded ? (
              <>
                <div className="drop-icon">✅</div>
                <div className="drop-title" style={{color:'var(--green)'}}>{fileName}</div>
                <div className="drop-sub">{result.length.toLocaleString()}행 변환됨 · 클릭하여 재업로드</div>
              </>
            ) : (
              <>
                <div className="drop-icon">📊</div>
                <div className="drop-title">KT 가전제품 파일을 이곳에 끌어다 놓으세요</div>
                <div className="drop-sub">KT_가전제품.xlsx 형식</div>
                <div className="drop-formats">
                  <span className="fmt-tag">.xlsx</span>
                  <span className="fmt-tag">.xls</span>
                  <span className="fmt-tag">.csv</span>
                </div>
              </>
            )}
          </div>
          <div className="info-box">
            <strong>입력 파일 컬럼 구조</strong>
            · <b>A열</b> 브랜드 (삼성전자, LG전자 등)<br/>
            · <b>B열</b> 제품그룹 (세탁기, 정수기 등) → 카테고리 코드 자동 변환<br/>
            · <b>C열</b> 상품명 → 제품명에 계약기간 추가: "삼성 세탁기 21KG (36)"<br/>
            · <b>D열</b> 모델코드 → 모델명<br/>
            · <b>E열</b> 계약기간 → 렌탈기간<br/>
            · <b>F열</b> 렌탈료 → 렌탈가
          </div>
        </div>

        <div className="card fi fi-1">
          <div className="card-head">
            <div className="card-icon">📖</div>
            <span className="card-title">변환 규칙 참고</span>
          </div>
          <div>
            <div className="ref-block">
              <div className="sec-label">구전산 컬럼 매핑</div>
              {[
                {kw:'제품코드', arr:'→', out:'KT+YYMMDD+순번(3자리)'},
                {kw:'제품명',   arr:'→', out:'상품명 (계약기간)'},
                {kw:'모델명',   arr:'→', out:'D열 모델코드'},
                {kw:'제품그룹', arr:'→', out:'B열 → 카테고리 코드'},
                {kw:'브랜드',   arr:'→', out:'■KT가전구독'},
                {kw:'일반판매가', arr:'→', out:'0'},
                {kw:'렌탈기간', arr:'→', out:'E열 계약기간'},
                {kw:'렌탈가',   arr:'→', out:'F열 렌탈료'},
                {kw:'세부구분', arr:'→', out:'(빈 값)'},
                {kw:'입력자',   arr:'→', out:'TNC임진형'},
              ].map((r,i)=>(
                <div className="ref-rule-row" key={i}>
                  <span className="ref-rule-kw">{r.kw}</span>
                  <span className="ref-rule-arr">{r.arr}</span>
                  <span className="ref-rule-out">{r.out}</span>
                </div>
              ))}
            </div>
            <div className="divider" />
            <div className="ref-block">
              <div className="sec-label">제품명 구성 예시</div>
              <div style={{fontSize:11.5, padding:'10px 12px', background:'var(--orange-08)', border:'1px solid var(--orange-15)', borderRadius:8, fontFamily:'var(--mono)', color:'var(--text)', lineHeight:1.9}}>
                상품명: 삼성 세탁기 21KG<br/>
                계약기간: 36<br/>
                <span style={{color:'var(--orange)', fontWeight:700}}>→ 삼성 세탁기 21KG (36)</span>
              </div>
            </div>
            <div className="divider" />
            <div className="ref-block">
              <div className="sec-label">빈 값 처리 컬럼</div>
              <div className="color-chip-grid">
                {['접수여부','조리수체크','제품설명','세부구분','입력일시','수정자','수정일시'].map(c=>(
                  <span className="color-chip" key={c}>{c}</span>
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>

      {phase === 'preview' && result.length > 0 && (
        <>
          <KTPreviewTable result={result} />
          <div className="act-bar fi fi-2">
            <div className="act-info">
              <strong>{result.length.toLocaleString()}행</strong> KT가전 구전산 변환 완료 · ✅<br/>
              <span style={{fontSize:12}}>
                제품코드 KT{dateStr}{String(seqNum).padStart(3,'0')} ~ KT{dateStr}{String(endSeq).padStart(3,'0')} · 출력: {fileName.replace(/\.(xlsx|xls|csv)$/i,'_KT구전산.xlsx')}
              </span>
            </div>
            <div className="act-btns">
              <button className="btn-ghost" onClick={()=>{setPhase('upload');setRawData([]);setResult([]);setFileName('');}}>← 초기화</button>
              <button className="btn-dl" onClick={()=>exportKTXlsx(result, fileName)}>📥 구전산 엑셀 다운로드</button>
              {result.length > 9000 && (
                <button
                  className="btn-dl"
                  style={{background:'var(--blue)', boxShadow:'0 4px 14px rgba(37,99,235,0.5)'}}
                  onClick={()=>exportKTXlsxSplit(result, fileName, 9000)}
                >
                  📦 9000행 분할 ({Math.ceil(result.length/9000)}개 파일)
                </button>
              )}
            </div>
          </div>
        </>
      )}
    </>
  );
}

/* ════════════════════════════════════════════════════════
   루트 앱

      <main className="main">

      </main>

      <footer className="footer">
        모든 데이터는 이 브라우저 안에서만 처리됩니다. 외부 서버로 전송되는 정보는 없습니다.
      </footer>

  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<TabApp />);
</script>
</body>
